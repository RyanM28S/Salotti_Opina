<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorias de Avaliação</title>
    <link id="cssP" rel="stylesheet" href="../css/categorias.css">
    <link rel="stylesheet" href="../css/head.css">
</head>

<body>
    <header>
        <div class="header">
            <div class="himg">
                <img src="" alt=""> 
            </div>
            <div class="htitulo">
                <h2 class="htitulo">Salotti Opina</h2>
            </div>

            <div class="dinputh">
                <input type="text" name="pesquisar" placeholder="Buscar professores..." class="inputh" >
            </div>
            <div>
                <button type="submit" class="hbutton"><h3>+ Nova avaliação</h3></button>
            </div>
        </div>
        <nav class="nav1">
            <a href="interface.html" class="inicio">Início</a>
            <a href="AvaliçaoP.html" class="professores1">Professores </a>
            <a href="categorias.html" class="categorias">Categorias </a>
        </nav>
    </header>
    <main id="corpoCa">

        <section class="container">
            <header class="headeer">
                <h1>Categorias</h1>
                <p>Avalie diferentes aspectos da escola</p>
            </header>

            <div class="grid-categorias">
                <button id="cantina" class="card">
                    <div class="card-top">
                        <div class="icon-box orange"><img src="../img/Cantina.png" alt=""></div>
                        <span class="rating">4.2</span>
                    </div>
                    <h3>Cantina</h3>
                    <p>Avalie a qualidade da comida, preços e atendimento</p>
                    <div class="divider"></div>
                    <span class="reviews">234 avaliações</span>
                </button>

                <button id="wi" class="card">
                    <div class="card-top">
                        <div class="icon-box blue"><img src="../img/Internet.png" alt=""></div>
                        <span class="rating">2.0</span>
                    </div>
                    <h3>Internet/Wi-Fi</h3>
                    <p>Qualidade da conexão e disponibilidade</p>
                    <div class="divider"></div>
                    <span class="reviews">997 avaliações</span>
                </button>

                <button id="bib" class="card">
                    <div class="card-top">
                        <div class="icon-box purple"><img src="../img/Biblioteca.png" alt=""></div>
                        <span class="rating">4.5</span>
                    </div>
                    <h3>Biblioteca</h3>
                    <p>Acervo, ambiente e horários de funcionamento</p>
                    <div class="divider"></div>
                    <span class="reviews">200 avaliações</span>
                </button>

                <button id="inf" class="card">
                    <div class="card-top">
                        <div class="icon-box green"><img src="../img/Infraestrutura.png" alt=""></div>
                        <span class="rating">4.0</span>
                    </div>
                    <h3>Infraestrutura</h3>
                    <p>Salas, laboratórios e instalações em geral</p>
                    <div class="divider"></div>
                    <span class="reviews">342 avaliações</span>
                </button>

                <button id="att" class="card">
                    <div class="card-top">
                        <div class="icon-box pink"><img src="../img/Atendimento.png" alt=""></div>
                        <span class="rating">4.0</span>
                    </div>
                    <h3>Atendimento</h3>
                    <p>Secretaria, coordenação e suporte ao aluno</p>
                    <div class="divider"></div>
                    <span class="reviews">208 avaliações</span>
                </button>
            </div>
        </section>
    </main>
    <footer class="footer">
        <p>&copy; 2023 salotti Opina - Avaliações escolares transparentes.</p>
    </footer>
    <script src="../js/categorias.js"></script>
</body>

</html>
